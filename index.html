<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Creation in Progress</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --accent-border: #6366f1;
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            border-radius: 24px;
            background: linear-gradient(145deg, #111827, #1f2937);
            box-shadow: 0 0 40px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 440px;
            width: 90%;
            position: relative;
        }

        .icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .emoji {
            font-size: 3.5rem;
            position: relative;
            z-index: 2;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .pulse-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: var(--accent-border);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.3;
            z-index: 1;
            animation: pulse 2s infinite alternate;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.75rem 0;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
            margin: 0 0 2rem 0;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #34d399;
            border-radius: 50%;
            box-shadow: 0 0 8px #34d399;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">
            <div class="pulse-glow"></div>
            <div class="emoji">🎉</div>
        </div>
        <h1>Under Construction</h1>
        <p>Hang tight! A brand new personal website is currently being built right here. Check back soon to see what's cooking.</p>
        
        <div class="status-badge">
            <div class="status-dot"></div>
            DNS Connected
        </div>
    </div>

</body>
</html>
